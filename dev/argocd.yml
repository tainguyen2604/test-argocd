apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
spec:
  destination:
    name: ''
    namespace: argocd
    server: 'https://kubernetes.default.svc'
  source:
    path: values
    repoURL: 'https://github.com/tainguyen2604/test-argocd.git'
    targetRevision: main
    plugin:
      name: helm-resolver
      env:
        - name: REPO_NAME
          value: argo
        - name: REPO_URL
          value: 'https://argoproj.github.io/argo-helm'
        - name: CHART_NAME
          value: argo-cd
        - name: COMMAND
          value: '--values argocd.yml'
        - name: CHART_VERSION
          value: 5.4.4
  project: default
  syncPolicy:
    retry:
      limit: 2
      backoff:
        duration: 5s
        maxDuration: 60s
        factor: 2
    syncOptions:
      - PruneLast=true
      - CreateNamespace=true
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dev-alertmanager
  namespace: argocd
spec:
  destination:
    name: ''
    namespace: urbox-system
    server: 'https://kubernetes.default.svc'
  source:
    path: apps/manifest/Dev/apps/helm-applications/values
    repoURL: 'git@github.com:urbox-vn/gitops-application-k8s.git'
    targetRevision: main
    plugin:
      name: helm-resolver
      env:
        - name: REPO_NAME
          value: prometheus-community
        - name: REPO_URL
          value: 'https://prometheus-community.github.io/helm-charts'
        - name: CHART_NAME
          value: alertmanager
        - name: COMMAND
          value: '--values alertmanager-values.yml'
        - name: CHART_VERSION
          value: 0.21.0
  project: default
  syncPolicy:
    syncOptions:
      - PruneLast=true
      - CreateNamespace=true
    automated:
      selfHeal: true
      prune: true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
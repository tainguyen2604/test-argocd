apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus
  namespace: argocd
  # finalizers:
  #   - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    name: ''
    namespace: monitoring
    server: 'https://kubernetes.default.svc'
  source:
    path: values
    repoURL: 'git@github.com:urbox-vn/gitops-application-k8s.git'
    targetRevision: main
    plugin:
      name: helm-resolver
      env:
        - name: REPO_NAME
          value: prometheus-community
        - name: REPO_URL
          value: 'https://prometheus-community.github.io/helm-charts'
        - name: CHART_NAME
          value: prometheus
        - name: COMMAND
          value: '--values prometheus.yml'
        - name: CHART_VERSION
          value: 15.12.2
  project: default
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      selfHeal: true
      prune: true